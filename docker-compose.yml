services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: srebot-docs
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.srebot-docs.rule=Host(`srebot.site360.tech`) && PathPrefix(`/docs`)"
      - "traefik.http.middlewares.docs-stripprefix.stripprefix.prefixes=/docs"
      - "traefik.http.routers.srebot-docs.middlewares=docs-stripprefix"
      - "traefik.http.routers.srebot-docs.entrypoints=websecure"
      - "traefik.http.routers.srebot-docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.srebot-docs.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
