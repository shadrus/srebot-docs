server {
    listen 80;
    server_name localhost;
    
    # We set the root to the parent directory.
    # Because our files will be in /usr/share/nginx/html/docs
    root /usr/share/nginx/html;

    location / {
        # This handles cleanUrls: true by trying the requested path, 
        # then the path + .html, then as a directory.
        try_files $uri $uri.html $uri/ =404;
    }
    
    # Optional performance tweaks for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}
